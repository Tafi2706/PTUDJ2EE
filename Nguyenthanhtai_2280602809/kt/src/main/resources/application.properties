spring.application.name=kt

# ========================
# MySQL Data Source Config
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/KTJ2EE?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate Config
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# Thymeleaf Config
# ========================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ========================
# File Upload Config
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Server Config
# ========================
server.port=8080

