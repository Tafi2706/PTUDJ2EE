<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đặt lịch khám - ClinicCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f,#06b6d4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .card{background:#fff;border-radius:20px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.3);}
        .card-header{background:linear-gradient(135deg,#1e40af,#2563eb,#06b6d4);padding:28px 32px;}
        .card-header h1{color:#fff;font-size:1.3rem;font-weight:700;}
        .card-header p{color:rgba(255,255,255,0.75);font-size:0.88rem;margin-top:4px;}
        .card-body{padding:28px 32px 36px;}

        /* Doctor card inside form */
        .doctor-info{display:flex;align-items:center;gap:14px;background:#f0f4ff;border-radius:12px;padding:14px;margin-bottom:24px;border:1.5px solid #dbeafe;}
        .doctor-info img{width:56px;height:56px;border-radius:10px;object-fit:cover;object-position:top;background:#dbeafe;}
        .doctor-info h3{font-size:1rem;font-weight:700;color:#1e293b;}
        .doctor-info p{font-size:0.82rem;color:#64748b;margin-top:2px;}
        .tag{display:inline-block;background:#eff6ff;color:#2563eb;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600;margin-top:4px;}

        /* Form */
        .form-group{margin-bottom:18px;}
        label{display:block;font-weight:600;font-size:0.78rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
        .input-wrap{position:relative;}
        .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:0.88rem;}
        input[type=date]{width:100%;padding:11px 14px 11px 38px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:0.92rem;font-family:'Inter',sans-serif;color:#1e293b;background:#f8faff;outline:none;transition:border-color .2s,box-shadow .2s;}
        input[type=date]:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12);}

        .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-submit:hover{opacity:.88;}
        .btn-back{display:block;text-align:center;margin-top:14px;color:#64748b;font-size:0.88rem;text-decoration:none;transition:color .2s;}
        .btn-back:hover{color:#2563eb;}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1><i class="fa fa-calendar-plus"></i> Đặt lịch khám</h1>
        <p>Chọn ngày bạn muốn đến khám</p>
    </div>
    <div class="card-body">

        <!-- Thông tin bác sĩ -->
        <div class="doctor-info">
            <img th:src="${doctor.image != null and !doctor.image.isEmpty()} ? ${doctor.image} : 'https://i.pravatar.cc/100?u=' + ${doctor.id}"
                 th:alt="${doctor.name}"/>
            <div>
                <h3 th:text="${doctor.name}">Tên bác sĩ</h3>
                <p th:text="${doctor.department != null} ? ${doctor.department.name} : '—'">Khoa</p>
                <span class="tag" th:text="${doctor.specialty ?: '—'}">Chuyên khoa</span>
            </div>
        </div>

        <!-- Form đặt lịch -->
        <form th:action="@{/enroll}" method="post">
            <input type="hidden" name="doctorId" th:value="${doctor.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="appointmentDate">Ngày khám</label>
                <div class="input-wrap">
                    <i class="fa fa-calendar"></i>
                    <input type="date" id="appointmentDate" name="appointmentDate"
                           th:min="${today}" required/>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa fa-circle-check"></i> Xác nhận đặt lịch
            </button>
        </form>

        <a class="btn-back" th:href="@{/home}">
            <i class="fa fa-arrow-left"></i> Quay lại danh sách bác sĩ
        </a>
    </div>
</div>
</body>
</html>
