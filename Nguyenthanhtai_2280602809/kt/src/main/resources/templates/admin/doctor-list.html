<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý Bác sĩ - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
            --danger: #dc2626; --danger-light: #fee2e2;
            --success: #16a34a; --success-light: #dcfce7;
            --bg: #f0f4ff; --card: #fff; --text: #1e293b; --muted: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 20px rgba(37,99,235,0.08);
            --radius: 14px; --navbar-h: 64px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }

        /* NAVBAR */
        .navbar {
            position:fixed; top:0; left:0; right:0; z-index:100; height:var(--navbar-h);
            background:rgba(255,255,255,0.9); backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between; padding:0 36px;
            box-shadow:0 2px 12px rgba(37,99,235,0.07);
        }
        .navbar-brand { font-size:1.15rem; font-weight:700; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .navbar-links { display:flex; align-items:center; gap:8px; }
        .nav-link { padding:7px 16px; border-radius:8px; text-decoration:none; color:var(--muted); font-weight:500; font-size:0.88rem; transition:all 0.2s; }
        .nav-link:hover { background:var(--primary-light); color:var(--primary); }
        .btn-sm { padding:7px 16px; border-radius:8px; font-size:0.88rem; font-weight:600; cursor:pointer; border:none; text-decoration:none; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
        .btn-logout { background:var(--danger-light); color:var(--danger); }
        .btn-logout:hover { background:var(--danger); color:#fff; }

        /* CONTENT */
        .main { padding-top:calc(var(--navbar-h) + 32px); padding-bottom:60px; max-width:1100px; margin:0 auto; padding-left:24px; padding-right:24px; }

        /* PAGE HEADER */
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
        .page-header h1 { font-size:1.5rem; font-weight:700; }
        .page-header h1 span { color:var(--primary); }
        .btn-add { background:linear-gradient(135deg,var(--primary),#06b6d4); color:#fff; padding:10px 22px; border-radius:10px; font-size:0.92rem; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:opacity 0.2s; border:none; cursor:pointer; }
        .btn-add:hover { opacity:0.88; }

        /* TABLE CARD */
        .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead { background:linear-gradient(135deg,#1e40af,#2563eb); }
        thead th { color:#fff; font-weight:600; font-size:0.82rem; letter-spacing:0.4px; padding:14px 16px; text-align:left; }
        tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:#f8faff; }
        tbody td { padding:14px 16px; font-size:0.9rem; color:var(--text); vertical-align:middle; }

        /* Avatar */
        .doc-avatar { width:44px; height:44px; border-radius:10px; object-fit:cover; object-position:top; background:#dbeafe; }
        .doc-name { font-weight:600; }

        /* Badges */
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .badge-specialty { background:var(--primary-light); color:var(--primary); }
        .badge-dept { background:#f0fdf4; color:#15803d; }

        /* Action buttons */
        .actions { display:flex; gap:8px; }
        .btn-edit { background:#fef9c3; color:#ca8a04; border:none; border-radius:8px; padding:7px 14px; font-size:0.82rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; }
        .btn-edit:hover { background:#ca8a04; color:#fff; }
        .btn-delete { background:var(--danger-light); color:var(--danger); border:none; border-radius:8px; padding:7px 14px; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; }
        .btn-delete:hover { background:var(--danger); color:#fff; }

        /* Empty */
        .empty-row td { text-align:center; color:var(--muted); padding:40px; }

        /* Alert */
        .alert { padding:12px 16px; border-radius:10px; margin-bottom:20px; font-size:0.9rem; display:flex; align-items:center; gap:8px; }
        .alert-success { background:var(--success-light); color:var(--success); }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/home}">
        <i class="fa-solid fa-stethoscope"></i> ClinicCare <span style="font-size:0.7rem;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:10px;margin-left:4px;">ADMIN</span>
    </a>
    <div class="navbar-links">
        <a class="nav-link" th:href="@{/home}"><i class="fa fa-home"></i> Trang chủ</a>
        <a class="nav-link" th:href="@{/admin/doctors}" style="background:var(--primary-light);color:var(--primary)">
            <i class="fa fa-user-doctor"></i> Bác sĩ
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button class="btn-sm btn-logout" type="submit"><i class="fa fa-right-from-bracket"></i> Đăng xuất</button>
        </form>
    </div>
</nav>

<div class="main">
    <div class="page-header">
        <h1>Quản lý <span>Bác sĩ</span></h1>
        <a class="btn-add" th:href="@{/admin/doctors/create}">
            <i class="fa fa-plus"></i> Thêm bác sĩ
        </a>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ảnh</th>
                    <th>Tên bác sĩ</th>
                    <th>Chuyên khoa</th>
                    <th>Khoa</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${doctors.isEmpty()}" class="empty-row">
                    <td colspan="6"><i class="fa fa-inbox"></i> Chưa có bác sĩ nào.</td>
                </tr>
                <tr th:each="doctor, stat : ${doctors}">
                    <td th:text="${stat.index + 1}" style="color:var(--muted);font-weight:500;"></td>
                    <td>
                        <img class="doc-avatar"
                             th:src="${doctor.image != null and !doctor.image.isEmpty()} ? ${doctor.image} : 'https://i.pravatar.cc/100?u=' + ${doctor.id}"
                             th:alt="${doctor.name}"/>
                    </td>
                    <td class="doc-name" th:text="${doctor.name}"></td>
                    <td><span class="badge badge-specialty" th:text="${doctor.specialty ?: '—'}"></span></td>
                    <td><span class="badge badge-dept" th:text="${doctor.department != null ? doctor.department.name : '—'}"></span></td>
                    <td>
                        <div class="actions">
                            <a class="btn-edit" th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}">
                                <i class="fa fa-pen"></i> Sửa
                            </a>
                            <form th:action="@{/admin/doctors/delete/{id}(id=${doctor.id})}" method="post"
                                  onsubmit="return confirm('Xác nhận xóa bác sĩ này?')">
                                <button class="btn-delete" type="submit">
                                    <i class="fa fa-trash"></i> Xóa
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
