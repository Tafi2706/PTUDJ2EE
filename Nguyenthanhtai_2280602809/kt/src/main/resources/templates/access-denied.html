<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Truy cập bị từ chối</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f0f4ff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .icon{font-size:5rem;color:#dc2626;margin-bottom:20px}
        h1{font-size:2rem;font-weight:700;color:#1e293b;margin-bottom:10px}
        p{color:#64748b;font-size:1rem;margin-bottom:28px}
        .btn{display:inline-block;padding:12px 28px;background:#2563eb;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;transition:opacity 0.2s}
        .btn:hover{opacity:0.85}
    </style>
</head>
<body>
    <i class="fa-solid fa-shield-xmark icon"></i>
    <h1>Truy cập bị từ chối</h1>
    <p>Bạn không có quyền truy cập vào trang này.</p>
    <a class="btn" th:href="@{/home}"><i class="fa fa-home"></i> Về trang chủ</a>
</body>
</html>
