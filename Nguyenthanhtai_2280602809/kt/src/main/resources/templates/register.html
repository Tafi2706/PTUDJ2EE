<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký tài khoản - ClinicCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#06b6d4 100%);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:20px;
        }
        .card{
            background:#fff;border-radius:20px;
            padding:0;width:100%;max-width:440px;
            box-shadow:0 24px 80px rgba(0,0,0,0.25);
            overflow:hidden;
        }
        .card-header{
            background:linear-gradient(135deg,#1e40af,#2563eb,#06b6d4);
            padding:32px 36px 28px;text-align:center;
        }
        .card-header i{font-size:2.4rem;color:#fff;opacity:0.9;}
        .card-header h1{font-size:1.45rem;font-weight:700;color:#fff;margin-top:10px;}
        .card-header p{color:rgba(255,255,255,0.75);font-size:0.88rem;margin-top:4px;}

        .card-body{padding:32px 36px 36px;}

        .form-group{margin-bottom:18px;}
        label{
            display:block;font-weight:600;font-size:0.78rem;
            color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;
        }
        .input-wrap{position:relative;}
        .input-wrap i{
            position:absolute;left:13px;top:50%;transform:translateY(-50%);
            color:#94a3b8;font-size:0.88rem;pointer-events:none;
        }
        input{
            width:100%;padding:11px 14px 11px 38px;
            border:1.5px solid #e2e8f0;border-radius:10px;
            font-size:0.92rem;font-family:'Inter',sans-serif;
            color:#1e293b;background:#f8faff;outline:none;
            transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
        }
        input:focus{
            border-color:#2563eb;background:#fff;
            box-shadow:0 0 0 3px rgba(37,99,235,0.12);
        }
        input::placeholder{color:#cbd5e1;}

        /* Password strength bar */
        .strength-bar{height:4px;border-radius:2px;background:#e2e8f0;margin-top:6px;overflow:hidden;}
        .strength-fill{height:100%;width:0;border-radius:2px;transition:width 0.3s,background 0.3s;}

        /* Alerts */
        .alert{
            padding:11px 14px;border-radius:9px;margin-bottom:18px;
            font-size:0.88rem;display:flex;align-items:center;gap:8px;
        }
        .alert-error{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;}
        .alert-success{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}

        /* Submit */
        .btn-submit{
            width:100%;padding:13px;margin-top:6px;
            background:linear-gradient(135deg,#2563eb,#06b6d4);
            color:#fff;border:none;border-radius:10px;
            font-size:1rem;font-weight:700;cursor:pointer;
            transition:opacity 0.2s,transform 0.15s;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .btn-submit:hover{opacity:0.88;transform:scale(0.99);}

        /* Divider */
        .divider{text-align:center;color:#94a3b8;font-size:0.85rem;margin:18px 0 0;}
        .divider a{color:#2563eb;font-weight:600;text-decoration:none;}
        .divider a:hover{text-decoration:underline;}

        /* Requirements hint */
        .hint{font-size:0.75rem;color:#94a3b8;margin-top:5px;}

        @media(max-width:480px){
            .card-body{padding:24px 20px 28px;}
            .card-header{padding:24px 20px 20px;}
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-user-plus"></i>
        <h1>Tạo tài khoản mới</h1>
        <p>Đăng ký để đặt lịch khám bệnh trực tuyến</p>
    </div>
    <div class="card-body">

        <!-- Error -->
        <div class="alert alert-error" th:if="${error}">
            <i class="fa fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Username -->
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <div class="input-wrap">
                    <i class="fa fa-user"></i>
                    <input type="text" id="username" name="username"
                           placeholder="Nhập tên đăng nhập" required
                           minlength="3" maxlength="50"/>
                </div>
                <p class="hint">Từ 3–50 ký tự, không có khoảng trắng.</p>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="input-wrap">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" name="password"
                           placeholder="Nhập mật khẩu" required
                           minlength="6" oninput="checkStrength(this.value)"/>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <p class="hint" id="strengthText">Ít nhất 6 ký tự.</p>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" name="email"
                           placeholder="example@gmail.com" required/>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="registerBtn">
                <i class="fa fa-user-plus"></i> Đăng ký ngay
            </button>
        </form>

        <div class="divider">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </div>
    </div>
</div>

<script>
    function checkStrength(pw) {
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (pw.length >= 6) score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
            {w:'0%', c:'#e2e8f0', t:'Nhập mật khẩu...'},
            {w:'25%',c:'#ef4444', t:'Yếu'},
            {w:'50%',c:'#f97316', t:'Trung bình'},
            {w:'75%',c:'#eab308', t:'Khá'},
            {w:'100%',c:'#22c55e',t:'Mạnh 💪'},
        ];
        const lvl = Math.min(score, 4);
        fill.style.width = levels[lvl].w;
        fill.style.background = levels[lvl].c;
        text.textContent = levels[lvl].t;
        text.style.color = levels[lvl].c;
    }
</script>
</body>
</html>
