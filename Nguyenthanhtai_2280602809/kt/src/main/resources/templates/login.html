<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - ClinicCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e40af,#06b6d4);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
        .logo{text-align:center;margin-bottom:28px}
        .logo i{font-size:2.5rem;color:#2563eb}
        .logo h1{font-size:1.5rem;font-weight:700;color:#1e293b;margin-top:8px}
        .logo p{color:#64748b;font-size:0.9rem;margin-top:4px}
        .form-group{margin-bottom:18px}
        label{display:block;font-weight:600;font-size:0.85rem;color:#374151;margin-bottom:6px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:0.9rem}
        input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:0.92rem;font-family:'Inter',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;outline:none}
        input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.12)}
        .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
        .btn-submit:hover{opacity:0.88}
        .alert-error{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:0.88rem;display:flex;align-items:center;gap:8px}
        .links{text-align:center;margin-top:20px;font-size:0.88rem;color:#64748b}
        .links a{color:#2563eb;font-weight:600;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <i class="fa-solid fa-stethoscope"></i>
        <h1>ClinicCare</h1>
        <p>Đăng nhập vào tài khoản của bạn</p>
    </div>

    <div class="alert-error" th:if="${param.error}">
        <i class="fa fa-circle-exclamation"></i>
        Tên đăng nhập hoặc mật khẩu không đúng.
    </div>
    <div class="alert-error" style="background:#dcfce7;color:#16a34a" th:if="${param.logout}">
        <i class="fa fa-check-circle"></i>
        Đã đăng xuất thành công.
    </div>
    <div class="alert-error" style="background:#dcfce7;color:#16a34a" th:if="${param.registered}">
        <i class="fa fa-user-check"></i>
        Đăng ký thành công! Vui lòng đăng nhập.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <div class="input-wrap">
                <i class="fa fa-user"></i>
                <input type="text" id="username" name="username" placeholder="Nhập username" required/>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrap">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required/>
            </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-submit">
            <i class="fa fa-right-to-bracket"></i> Đăng nhập
        </button>
    </form>

    <div class="links">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
    </div>
</div>
</body>
</html>
