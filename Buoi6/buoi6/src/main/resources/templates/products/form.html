<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - ProductManager'">Form Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .user-badge {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
        }
        .card {
            border: none; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 680px; margin: 0 auto;
        }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; font-weight: 600;
        }
        .form-label { font-weight: 500; color: #374151; }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.25);
        }
        .btn-save { background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; color: white; }
        .btn-save:hover { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; }
        .required-star { color: #ef4444; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4"
     style="background: linear-gradient(135deg, #0f172a, #1e3a8a);">
    <div class="container">
        <a class="navbar-brand" href="/products">
            <i class="bi bi-box-seam me-2"></i>ProductManager
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="user-badge text-white">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">username</span>
                <span class="badge bg-warning text-dark ms-1">ADMIN</span>
            </span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="/products" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Sản phẩm
                </a>
            </li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header py-3">
            <h5 class="mb-0">
                <i class="bi bi-pencil-square me-2" th:if="${product.id != null}"></i>
                <i class="bi bi-plus-circle me-2" th:if="${product.id == null}"></i>
                <span th:text="${pageTitle}">Form Sản phẩm</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/products/save}" th:object="${product}" method="post">
                <!-- Hidden ID (edit mode) -->
                <input type="hidden" th:field="*{id}">

                <!-- Tên sản phẩm -->
                <div class="mb-3">
                    <label for="name" class="form-label">
                        Tên sản phẩm <span class="required-star">*</span>
                    </label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           placeholder="Nhập tên sản phẩm">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">Lỗi tên</div>
                </div>

                <!-- Giá -->
                <div class="mb-3">
                    <label for="price" class="form-label">
                        Giá (VND) <span class="required-star">*</span>
                    </label>
                    <div class="input-group">
                        <input type="number" id="price" th:field="*{price}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                               placeholder="0" min="0" step="1000">
                        <span class="input-group-text">₫</span>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                             th:errors="*{price}">Lỗi giá</div>
                    </div>
                </div>

                <!-- Mô tả -->
                <div class="mb-3">
                    <label for="description" class="form-label">Mô tả</label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" rows="3"
                              placeholder="Nhập mô tả sản phẩm (tùy chọn)"></textarea>
                </div>

                <!-- Danh mục -->
                <div class="mb-4">
                    <label for="categoryId" class="form-label">
                        Danh mục <span class="required-star">*</span>
                    </label>
                    <select id="categoryId" name="categoryId"
                            class="form-select"
                            th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                        <option value="" disabled th:selected="${product.category == null}">
                            -- Chọn danh mục --
                        </option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                        </option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}"
                         th:errors="*{category}">Lỗi danh mục</div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-save px-4">
                        <i class="bi bi-floppy-fill me-1"></i>
                        <span th:text="${product.id != null} ? 'Cập nhật' : 'Lưu sản phẩm'">Lưu</span>
                    </button>
                    <a href="/products" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-1"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
