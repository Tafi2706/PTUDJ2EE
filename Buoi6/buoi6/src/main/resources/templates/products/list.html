<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sản phẩm - ProductManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .user-badge {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
        }
        .role-badge-admin { background: #fbbf24; color: #78350f; }
        .role-badge-user  { background: #34d399; color: #064e3b; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; font-weight: 600;
        }
        .table th { background-color: #f1f5f9; font-weight: 600; color: #475569; }
        .table tbody tr:hover { background-color: #f8fafc; }
        .price-cell { font-weight: 600; color: #0d9488; }
        .badge-category { background: #e0f2fe; color: #0369a1; }
        .btn-add { background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; color: white; }
        .btn-add:hover { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4"
     style="background: linear-gradient(135deg, #0f172a, #1e3a8a);">
    <div class="container">
        <a class="navbar-brand" href="/products">
            <i class="bi bi-box-seam me-2"></i>ProductManager
        </a>
        <div class="d-flex align-items-center gap-3">
            <!-- Hiển thị username và role đang đăng nhập -->
            <span class="user-badge text-white">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">username</span>
                <!-- Badge role -->
                <span sec:authorize="hasRole('ADMIN')"
                      class="badge role-badge-admin ms-1">ADMIN</span>
                <span sec:authorize="hasRole('USER') and !hasRole('ADMIN')"
                      class="badge role-badge-user ms-1">USER</span>
            </span>
            <!-- Nút Logout -->
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0">
                <i class="bi bi-boxes me-2"></i>Danh sách Sản phẩm
            </h5>
            <!-- Chỉ ADMIN mới thấy nút Thêm -->
            <a sec:authorize="hasRole('ADMIN')"
               href="/products/add"
               class="btn btn-add btn-sm px-3">
                <i class="bi bi-plus-circle me-1"></i> Thêm sản phẩm
            </a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width:50px;">#</th>
                        <th>Tên sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá (VND)</th>
                        <th>Mô tả</th>
                        <!-- Cột Actions chỉ hiện với ADMIN -->
                        <th sec:authorize="hasRole('ADMIN')" class="text-center" style="width:140px;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            Chưa có sản phẩm nào.
                            <a sec:authorize="hasRole('ADMIN')" href="/products/add">Thêm ngay!</a>
                        </td>
                    </tr>
                    <tr th:each="product, stat : ${products}">
                        <td class="ps-4 text-muted" th:text="${stat.index + 1}">1</td>
                        <td>
                            <strong th:text="${product.name}">Tên SP</strong>
                        </td>
                        <td>
                            <span class="badge badge-category px-2 py-1 rounded-pill"
                                  th:text="${product.category.name}">Danh mục</span>
                        </td>
                        <td class="price-cell"
                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </td>
                        <td class="text-muted small" th:text="${product.description}">Mô tả</td>
                        <!-- Actions: chỉ ADMIN -->
                        <td sec:authorize="hasRole('ADMIN')" class="text-center">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                               class="btn btn-warning btn-sm me-1" title="Sửa">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                               class="btn btn-danger btn-sm"
                               title="Xóa"
                               onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này không?')">
                                <i class="bi bi-trash-fill"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer text-muted small" th:if="${!#lists.isEmpty(products)}">
            Tổng: <strong th:text="${#lists.size(products)}">0</strong> sản phẩm
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
