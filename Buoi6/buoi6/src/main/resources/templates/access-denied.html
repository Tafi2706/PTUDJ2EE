<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối - ProductManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #7f1d1d);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            background: white; border-radius: 16px;
            padding: 48px 40px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 480px;
        }
        .error-icon { font-size: 5rem; color: #ef4444; margin-bottom: 16px; }
        h1 { font-size: 5rem; font-weight: 800; color: #dc2626; line-height: 1; }
        h2 { color: #1e293b; font-weight: 600; }
        p { color: #64748b; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon"><i class="bi bi-shield-exclamation"></i></div>
    <h1>403</h1>
    <h2 class="mb-3">Truy cập bị từ chối</h2>
    <p class="mb-4">Bạn không có quyền truy cập vào trang này. Chỉ tài khoản <strong>ADMIN</strong> mới có thể thực hiện thao tác này.</p>
    <a href="/products" class="btn btn-primary px-4">
        <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
