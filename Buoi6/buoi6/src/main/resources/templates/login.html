<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            padding: 32px 24px 24px;
            text-align: center;
        }
        .login-header .app-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .login-header h4 {
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .login-header p {
            opacity: 0.85;
            font-size: 0.875rem;
            margin-bottom: 0;
        }
        .login-body {
            background: white;
            padding: 32px 28px;
        }
        .form-label {
            font-weight: 500;
            color: #374151;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border-color: #d1d5db;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.2);
        }
        .input-group-text {
            background: #f1f5f9;
            border-color: #d1d5db;
            border-radius: 8px 0 0 8px;
            color: #64748b;
        }
        .btn-login {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }
        .alert-danger {
            border-radius: 8px;
            border: none;
            background: #fef2f2;
            color: #dc2626;
            font-size: 0.875rem;
        }
        .alert-success {
            border-radius: 8px;
            border: none;
            background: #f0fdf4;
            color: #16a34a;
            font-size: 0.875rem;
        }
        .hint-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.8rem;
            color: #0369a1;
            margin-top: 20px;
        }
        .hint-box strong { color: #0284c7; }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Header -->
    <div class="login-header">
        <div class="app-icon">
            <i class="bi bi-box-seam"></i>
        </div>
        <h4>Quản lý Sản phẩm</h4>
        <p>Spring Boot + Spring Security + Thymeleaf</p>
    </div>

    <!-- Body -->
    <div class="login-body">

        <!-- Lỗi đăng nhập -->
        <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại.
        </div>

        <!-- Đăng xuất thành công -->
        <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post">

            <!-- CSRF token do Spring Security + Thymeleaf tự xử lý -->

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text"
                           id="username"
                           name="username"
                           class="form-control"
                           placeholder="Nhập tên đăng nhập"
                           autofocus
                           required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Nhập mật khẩu"
                           required>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-login btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
            </button>
        </form>

        <!-- Gợi ý tài khoản mặc định -->
        <div class="hint-box">
            <strong><i class="bi bi-info-circle me-1"></i>Tài khoản mặc định:</strong><br>
            <span class="me-3">👑 <strong>admin</strong> / admin123 (Toàn quyền)</span><br>
            <span>👤 <strong>user</strong> / user123 (Chỉ xem)</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
